<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Notes — your inner world matters and deserves space</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ──────────────────────────────────────────────────────────
   DESIGN TOKENS — overridden live by JS time-of-day system
────────────────────────────────────────────────────────── */
:root {
  --bg-deep:   #050818;
  --bg-mid:    #0d0d2b;
  --aur-1:     #00f5a0;
  --aur-2:     #7b2ff7;
  --aur-3:     #ff006e;
  --tx-main:   232, 224, 240;
  --note-bg:   rgba(14, 11, 34, 0.86);
  --note-bd:   rgba(255,255,255,0.07);
  --glow:      rgba(0, 245, 160, 0.28);
  --pin-clr:   #e05252;
  transition: background 4s ease;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  min-height: 100vh;
  overflow-x: hidden;
  font-family: 'Crimson Pro', Georgia, serif;
  color: rgb(var(--tx-main));
  background: var(--bg-deep);
  cursor: default;
  transition: background 4s ease, color 4s ease;
}

/* ─── Canvases ─── */
#bg-canvas, #ptx-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
}
#bg-canvas  { z-index: 0; }
#ptx-canvas { z-index: 1; }

/* ─── App shell ─── */
#app { position: relative; z-index: 10; min-height: 100vh; }

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
.site-header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 120;
  padding: 18px 44px;
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(to bottom, rgba(0,0,0,.35) 0%, transparent 100%);
  pointer-events: none;
}
.hd-left { pointer-events: auto; }
.site-title {
  font-family: 'Caveat', cursive;
  font-size: 2rem; font-weight: 700;
  color: rgba(var(--tx-main),1);
  text-shadow: 0 0 24px var(--glow);
  letter-spacing: .02em;
  line-height: 1;
}
.site-tagline {
  font-style: italic; font-size: .88rem;
  color: rgba(var(--tx-main),.55);
  margin-top: 2px;
}
.hd-right {
  display: flex; align-items: center; gap: 16px;
  pointer-events: auto;
}
.time-chip {
  font-family: 'Caveat', cursive; font-size: .85rem;
  color: rgba(var(--tx-main),.5);
  letter-spacing: .06em;
}
#stargaze-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 18px;
  background: rgba(var(--tx-main),.06);
  border: 1px solid rgba(var(--tx-main),.12);
  border-radius: 24px;
  backdrop-filter: blur(16px);
  cursor: pointer;
  font-family: 'Caveat', cursive; font-size: .95rem;
  color: rgba(var(--tx-main),.8);
  transition: all .25s ease;
}
#stargaze-btn:hover {
  background: rgba(var(--tx-main),.14);
  border-color: rgba(var(--tx-main),.25);
  transform: scale(1.04);
}
#stargaze-btn.active { color: var(--aur-1); border-color: var(--aur-1); }

/* ══════════════════════════════════════════
   NOTES BOARD  (corkboard scatter)
══════════════════════════════════════════ */
#board {
  position: relative;
  padding: 110px 36px 120px;
  min-height: 100vh;
}

/* ─── note card ─── */
.note {
  position: absolute;
  background: var(--note-bg);
  border: 1px solid var(--note-bd);
  border-radius: 3px;
  padding: 22px 22px 18px;
  backdrop-filter: blur(18px) saturate(120%);
  -webkit-backdrop-filter: blur(18px) saturate(120%);
  box-shadow:
    0 6px 28px rgba(0,0,0,.42),
    0 0 0 1px rgba(255,255,255,.03),
    inset 0 1px 0 rgba(255,255,255,.06);
  cursor: pointer;
  /* breathing set via JS --breathe-delay */
  animation: breathe 7s ease-in-out infinite;
  animation-delay: var(--breathe-delay, 0s);
  will-change: transform;
  transition:
    box-shadow .4s ease,
    filter .4s ease,
    opacity .4s ease;
  user-select: none;
  z-index: 10;
}

/* paper grain */
.note::before {
  content:'';
  position:absolute; inset:0; border-radius:3px;
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 22px,
      rgba(255,255,255,.012) 22px,
      rgba(255,255,255,.012) 23px
    );
  pointer-events:none;
}
/* subtle tape strip at top */
.note::after {
  content:'';
  position:absolute; top:-7px; left:50%; transform:translateX(-50%);
  width:48px; height:16px;
  background: rgba(var(--tx-main),.08);
  border-radius: 2px;
  border: 1px solid rgba(var(--tx-main),.12);
}

@keyframes breathe {
  0%,100% { transform: var(--rot) translateY(0px); }
  50%      { transform: var(--rot) translateY(-5px); }
}

.note:hover {
  box-shadow:
    0 22px 56px rgba(0,0,0,.55),
    0 0 48px var(--glow),
    0 0 0 1px rgba(255,255,255,.1),
    inset 0 1px 0 rgba(255,255,255,.1);
  z-index: 60 !important;
  animation-play-state: paused;
}

/* expanded state */
.note.expanded {
  position: fixed !important;
  top: 50% !important; left: 50% !important;
  transform: translate(-50%,-50%) rotate(0deg) !important;
  width: min(600px, 90vw) !important;
  max-height: 85vh;
  overflow-y: auto;
  z-index: 220 !important;
  cursor: default;
  animation: none !important;
  transition: none;
}
.note.expanded::-webkit-scrollbar { width: 3px; }
.note.expanded::-webkit-scrollbar-thumb { background: rgba(var(--tx-main),.2); border-radius:2px; }

/* size variants */
.note.sz-s { width: 238px; }
.note.sz-m { width: 282px; }
.note.sz-l { width: 328px; }

/* entering animation */
.note.entering {
  animation: note-enter .6s cubic-bezier(.34,1.56,.64,1) forwards !important;
}
@keyframes note-enter {
  from { opacity:0; transform: var(--rot) scale(.85) translateY(20px); }
  to   { opacity:1; transform: var(--rot) translateY(0px); }
}

/* ─── pin icon ─── */
.pin {
  position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
  width: 14px; height: 14px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #ff8a80, var(--pin-clr) 60%);
  box-shadow: 0 2px 6px rgba(0,0,0,.5), 0 0 0 1px rgba(0,0,0,.2);
  z-index: 2;
  flex-shrink: 0;
  cursor: default;
}

/* ─── note header ─── */
.note-head {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px;
}
.note-av {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(var(--tx-main),.07);
  border: 1px solid rgba(var(--tx-main),.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.note-meta { flex: 1; min-width: 0; }
.note-author {
  font-family: 'Caveat', cursive; font-size: 1.05rem; font-weight: 600;
  color: rgba(var(--tx-main),1); line-height: 1.2;
}
.note-ts {
  font-size: .7rem; color: rgba(var(--tx-main),.45); margin-top: 1px;
}
.note-cat-tag {
  font-family: 'Caveat', cursive; font-size: .7rem;
  padding: 2px 9px;
  border-radius: 20px;
  background: rgba(var(--tx-main),.05);
  border: 1px solid rgba(var(--tx-main),.1);
  color: rgba(var(--tx-main),.55);
  white-space: nowrap; flex-shrink: 0;
}

/* ─── close button ─── */
.note-close {
  position: absolute; top: 11px; right: 11px;
  width: 26px; height: 26px; border-radius: 50%;
  background: rgba(var(--tx-main),.07);
  border: 1px solid rgba(var(--tx-main),.12);
  display: none; align-items: center; justify-content: center;
  cursor: pointer; font-size: .8rem; color: rgba(var(--tx-main),.7);
  transition: all .2s ease; z-index: 5;
}
.note.expanded .note-close { display: flex; }
.note-close:hover { background: rgba(var(--tx-main),.15); }

/* ─── content ─── */
.note-title {
  font-family: 'Caveat', cursive; font-size: 1.22rem;
  margin-bottom: 8px; color: rgba(var(--tx-main),1);
  line-height: 1.3;
}
.note-body {
  font-size: .98rem; line-height: 1.75;
  color: rgba(var(--tx-main),.88);
  white-space: pre-line;
}
.note-body.poem { font-style: italic; }

/* ─── audio player ─── */
.audio-wrap {
  margin-top: 13px;
  padding: 10px 13px;
  background: rgba(var(--tx-main),.04);
  border: 1px solid rgba(var(--tx-main),.08);
  border-radius: 6px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: all .2s ease;
}
.audio-wrap:hover { background: rgba(var(--tx-main),.09); }
.vinyl {
  font-size: 1.3rem;
  transition: transform .3s ease;
  display: inline-block;
}
.audio-wrap.playing .vinyl { animation: spin 2.2s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.waveform { display: flex; align-items: center; gap: 2px; height: 26px; flex:1; }
.wbar {
  width: 3px; border-radius: 2px;
  background: var(--aur-1); opacity: .55;
  animation: wv-idle 2s ease-in-out infinite;
  animation-delay: var(--wd, 0s);
  transition: opacity .3s;
}
.audio-wrap.playing .wbar,
.audio-wrap:hover .wbar { opacity: 1; animation: wv-live .55s ease-in-out infinite; animation-delay: var(--wd,0s); }
@keyframes wv-idle { 0%,100%{height:4px} 50%{height:8px} }
@keyframes wv-live { 0%,100%{height:4px} 50%{height:var(--wh,14px)} }
.audio-label { font-family:'Caveat',cursive; font-size:.82rem; color:rgba(var(--tx-main),.5); }

/* ─── mood stickers ─── */
.stickers { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 13px; }
.sticker {
  font-family: 'Caveat', cursive; font-size: .74rem;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px dashed rgba(var(--tx-main),.2);
  background: rgba(var(--tx-main),.04);
  color: rgba(var(--tx-main),.6);
  transform: rotate(var(--sr, -2deg));
  transition: transform .2s ease;
}
.sticker:hover { transform: rotate(0deg) scale(1.06); }

/* ─── reactions ─── */
.reactions {
  display: flex; gap: 7px;
  margin-top: 14px; padding-top: 12px;
  border-top: 1px solid rgba(var(--tx-main),.06);
  flex-wrap: wrap;
}
.rxn {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 11px;
  border-radius: 20px;
  border: 1px solid rgba(var(--tx-main),.1);
  background: rgba(var(--tx-main),.04);
  cursor: pointer;
  font-size: .88rem;
  color: rgba(var(--tx-main),.65);
  transition: all .2s ease;
}
.rxn:hover, .rxn.lit {
  background: rgba(var(--tx-main),.13);
  border-color: rgba(var(--tx-main),.22);
  transform: scale(1.08);
}
.rxn.lit { color: rgba(var(--tx-main),1); }
.rxn-n { font-family:'Caveat',cursive; font-size:.8rem; }

/* ─── whispers (comments) ─── */
.whispers { display: none; margin-top: 18px; padding-top: 14px; border-top: 1px solid rgba(var(--tx-main),.06); }
.note.expanded .whispers { display: block; }
.whispers-lbl { font-family:'Caveat',cursive; font-size:.74rem; color:rgba(var(--tx-main),.38); letter-spacing:.06em; margin-bottom:10px; }
.whisper { display:flex; gap:9px; margin-bottom:11px; }
.whisper-av { font-size:.95rem; flex-shrink:0; margin-top:1px; }
.whisper-body {}
.whisper-author { font-family:'Caveat',cursive; font-size:.88rem; color:rgba(var(--tx-main),.9); margin-bottom:2px; }
.whisper-text { font-size:.88rem; line-height:1.55; color:rgba(var(--tx-main),.65); }

/* add-comment input (shown when expanded) */
.add-whisper {
  display: none;
  margin-top: 12px;
  gap: 8px;
  align-items: center;
}
.note.expanded .add-whisper { display:flex; }
.whisper-input {
  flex: 1;
  background: rgba(var(--tx-main),.05);
  border: 1px solid rgba(var(--tx-main),.1);
  border-radius: 20px;
  padding: 7px 14px;
  font-family: 'Crimson Pro', serif; font-size:.9rem;
  color: rgba(var(--tx-main),1);
  outline: none;
  transition: border-color .2s;
}
.whisper-input:focus { border-color: rgba(var(--tx-main),.25); }
.whisper-input::placeholder { color: rgba(var(--tx-main),.35); }
.whisper-send {
  padding: 7px 16px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(135deg, var(--aur-1), var(--aur-2));
  color: #0d0d2b;
  font-family: 'Caveat',cursive; font-size:.88rem; font-weight:600;
  cursor: pointer; transition: all .2s ease;
}
.whisper-send:hover { transform:scale(1.05); opacity:.9; }

/* ══════════════════════════════════════════
   OVERLAY
══════════════════════════════════════════ */
#overlay {
  position: fixed; inset: 0; z-index: 180;
  background: transparent;
  pointer-events: none;
  transition: background .4s ease, backdrop-filter .4s ease;
}
#overlay.on {
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(5px);
  pointer-events: all;
}

/* ══════════════════════════════════════════
   COMPASS NAV
══════════════════════════════════════════ */
#compass {
  position: fixed; bottom: 40px; left: 40px; z-index: 250;
}
.cmp-core {
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--note-bg);
  border: 1px solid rgba(var(--tx-main),.18);
  backdrop-filter: blur(22px);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1.25rem;
  box-shadow: 0 4px 22px rgba(0,0,0,.45), 0 0 24px var(--glow);
  transition: transform .25s ease, box-shadow .25s ease;
  user-select: none;
}
.cmp-core:hover { transform: scale(1.1) rotate(15deg); }
.cmp-menu {
  position: absolute; bottom: 62px; left: 0;
  display: flex; flex-direction: column; gap: 7px;
  opacity: 0; pointer-events: none;
  transform: translateY(12px);
  transition: all .32s cubic-bezier(.34,1.56,.64,1);
}
#compass:hover .cmp-menu,
#compass.open .cmp-menu { opacity:1; pointer-events:all; transform:translateY(0); }
.cmp-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 18px 8px 13px;
  background: var(--note-bg);
  border: 1px solid rgba(var(--tx-main),.1);
  border-radius: 24px;
  backdrop-filter: blur(22px);
  cursor: pointer; white-space: nowrap;
  font-family: 'Caveat',cursive; font-size:.95rem;
  color: rgba(var(--tx-main),.85);
  transition: all .2s ease;
}
.cmp-item:hover { background: rgba(var(--tx-main),.12); transform: translateX(5px); }
.cmp-item.active { color: var(--aur-1); border-color: var(--aur-1); }
.cmp-icon { font-size:.95rem; }
#filter-badge {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  font-family: 'Caveat',cursive; font-size: 1rem;
  color: rgba(var(--tx-main),.55);
  background: var(--note-bg);
  border: 1px solid rgba(var(--tx-main),.1);
  padding: 6px 20px; border-radius: 24px;
  backdrop-filter: blur(16px);
  opacity: 0; pointer-events: none;
  transition: opacity .4s ease;
  z-index: 130;
}
#filter-badge.vis { opacity: 1; }

/* ══════════════════════════════════════════
   WRITE BUTTON (floating quill)
══════════════════════════════════════════ */
#write-btn {
  position: fixed; bottom: 40px; right: 40px; z-index: 250;
  width: 58px; height: 58px; border-radius: 50%;
  background: linear-gradient(135deg, var(--aur-1), var(--aur-2));
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.45rem;
  box-shadow: 0 5px 22px rgba(0,0,0,.45), 0 0 38px var(--glow), 0 0 70px rgba(0,245,160,.16);
  animation: quill-bob 4.5s ease-in-out infinite;
  transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease;
}
#write-btn:hover {
  transform: scale(1.15);
  box-shadow: 0 10px 36px rgba(0,0,0,.55), 0 0 60px var(--glow);
  animation-play-state: paused;
}
@keyframes quill-bob {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}

/* ══════════════════════════════════════════
   WRITE MODAL
══════════════════════════════════════════ */
#write-modal {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(.88);
  z-index: 290;
  width: min(560px, 92vw);
  background: var(--note-bg);
  border: 1px solid rgba(var(--tx-main),.13);
  border-radius: 4px;
  padding: 32px;
  backdrop-filter: blur(32px);
  box-shadow: 0 24px 90px rgba(0,0,0,.65), 0 0 70px var(--glow);
  opacity: 0; pointer-events: none;
  transition: all .42s cubic-bezier(.34,1.56,.64,1);
}
#write-modal.open { opacity:1; pointer-events:all; transform: translate(-50%,-50%) scale(1); }
.modal-title { font-family:'Caveat',cursive; font-size:1.65rem; color:rgba(var(--tx-main),1); margin-bottom:22px; }

/* avatar row */
.av-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
.av-opt {
  width:38px; height:38px; border-radius:50%;
  background:rgba(var(--tx-main),.06);
  border:2px solid rgba(var(--tx-main),.1);
  display:flex; align-items:center; justify-content:center;
  font-size:1.15rem; cursor:pointer;
  transition: all .2s ease;
}
.av-opt:hover,.av-opt.sel { background:rgba(var(--tx-main),.16); border-color:var(--aur-1); transform:scale(1.1); }

/* type row */
.type-row { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.type-opt {
  padding:5px 15px; border-radius:20px;
  border:1px solid rgba(var(--tx-main),.1);
  background:rgba(var(--tx-main),.04);
  color:rgba(var(--tx-main),.65);
  font-family:'Caveat',cursive; font-size:.9rem;
  cursor:pointer; transition: all .2s ease;
}
.type-opt:hover,.type-opt.sel { border-color:var(--aur-1); color:rgba(var(--tx-main),1); background:rgba(var(--tx-main),.1); }

/* inputs */
.m-field {
  width:100%; display:block;
  background:rgba(var(--tx-main),.04);
  border:1px solid rgba(var(--tx-main),.08);
  border-radius:4px; padding:11px 15px;
  color:rgba(var(--tx-main),1);
  font-family:'Crimson Pro',serif; font-size:.98rem;
  outline:none; resize:none; margin-bottom:12px;
  transition: border-color .2s;
}
.m-field:focus { border-color:rgba(var(--tx-main),.26); }
.m-field::placeholder { color:rgba(var(--tx-main),.35); }

/* mood area */
.mood-lbl { font-family:'Caveat',cursive; font-size:.78rem; color:rgba(var(--tx-main),.4); margin-bottom:7px; }
.mood-chips { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.mood-chip {
  font-family:'Caveat',cursive; font-size:.76rem;
  padding:3px 11px; border-radius:20px;
  border:1px dashed rgba(var(--tx-main),.18);
  background:transparent; color:rgba(var(--tx-main),.6);
  cursor:pointer; transition: all .2s ease;
}
.mood-chip:hover { background:rgba(var(--tx-main),.09); border-color:rgba(var(--tx-main),.35); }
.mood-chip.picked { opacity:.4; cursor:default; }
.mood-added-area {
  display:flex; flex-wrap:wrap; gap:7px;
  min-height:40px; padding:8px 10px;
  background:rgba(var(--tx-main),.03);
  border:1px solid rgba(var(--tx-main),.07);
  border-radius:4px; margin-bottom:16px;
  align-items:center;
}
.mood-picked {
  font-family:'Caveat',cursive; font-size:.76rem;
  padding:3px 11px; border-radius:20px;
  border:1px dashed rgba(var(--tx-main),.28);
  background:rgba(var(--tx-main),.08);
  color:rgba(var(--tx-main),.75);
  display:flex; align-items:center; gap:5px; cursor:pointer;
}
.mood-picked:hover { border-color:rgba(255,100,100,.4); color:rgba(255,150,150,.9); }

/* modal actions */
.m-actions { display:flex; justify-content:flex-end; gap:11px; margin-top:18px; }
.btn-c {
  padding:10px 20px; border-radius:4px;
  border:1px solid rgba(var(--tx-main),.12);
  background:transparent; color:rgba(var(--tx-main),.6);
  font-family:'Caveat',cursive; font-size:1rem;
  cursor:pointer; transition: all .2s;
}
.btn-c:hover { background:rgba(var(--tx-main),.07); border-color:rgba(var(--tx-main),.22); }
.btn-pub {
  padding:10px 22px; border-radius:4px;
  border:none;
  background: linear-gradient(135deg, var(--aur-1), var(--aur-2));
  color:#0a0a22;
  font-family:'Caveat',cursive; font-size:1rem; font-weight:700;
  cursor:pointer; transition: all .25s ease;
}
.btn-pub:hover { transform:scale(1.04); box-shadow:0 4px 22px var(--glow); }

/* ══════════════════════════════════════════

══════════════════════════════════════════ */
#toast {

  background: var(--note-bg);
  border: 1px solid rgba(var(--tx-main),.18);
  border-radius: 8px; padding: 11px 20px;

══════════════════════════════════════════ */

@keyframes ld-glow   {

/* ══════════════════════════════════════════

<script>
/* ================================================================
   AURORA NOTES — application
================================================================ */

// ── Palettes ────────────────────────────────────────────────────
const PAL = {
  night: {
    bgDeep:[5,8,24],   bgMid:[13,13,43],
    a1:[0,245,160],    a2:[123,47,247],   a3:[255,0,110],
    tx:[232,224,240],  noteBg:'rgba(14,11,34,.86)',  noteBd:'rgba(255,255,255,.07)',
    glow:'rgba(0,245,160,.28)',  pinClr:'#e05252',
    label:'✦ night',  ptx:'fireflies'
  },
  dawn: {
    bgDeep:[26,10,46], bgMid:[45,27,78],
    a1:[255,154,158],  a2:[250,208,196],  a3:[255,107,107],
    tx:[240,230,211],  noteBg:'rgba(30,15,50,.82)',  noteBd:'rgba(255,200,180,.12)',
    glow:'rgba(255,154,158,.3)', pinClr:'#c084a0',
    label:'✦ dawn',   ptx:'pollen'
  },
  day: {
    bgDeep:[135,206,235],bgMid:[184,228,249],
    a1:[116,185,255],  a2:[253,203,110],  a3:[253,121,168],
    tx:[40,40,75],     noteBg:'rgba(238,246,255,.9)', noteBd:'rgba(0,0,80,.08)',
    glow:'rgba(116,185,255,.38)', pinClr:'#a0a0cc',
    label:'✦ day',    ptx:'dust'
  }
};

function getToD(){
  const h=new Date().getHours();
  return h>=5&&h<9?'dawn':h>=9&&h<19?'day':'night';
}

let tod = getToD();

function applyPal(p){
  const r=document.documentElement.style;
  r.setProperty('--bg-deep',`rgb(${p.bgDeep})`);
  r.setProperty('--bg-mid', `rgb(${p.bgMid})`);
  r.setProperty('--aur-1',  `rgb(${p.a1})`);
  r.setProperty('--aur-2',  `rgb(${p.a2})`);
  r.setProperty('--aur-3',  `rgb(${p.a3})`);
  r.setProperty('--tx-main',`${p.tx[0]},${p.tx[1]},${p.tx[2]}`);
  r.setProperty('--note-bg',p.noteBg);
  r.setProperty('--note-bd',p.noteBd);
  r.setProperty('--glow',   p.glow);
  r.setProperty('--pin-clr',p.pinClr);
  document.getElementById('time-chip').textContent=p.label;
}

applyPal(PAL[tod]);
setInterval(()=>{const n=getToD();if(n!==tod){tod=n;applyPal(PAL[tod]);}},60000);

// ── Background Aurora Canvas ────────────────────────────────────
const bgC=document.getElementById('bg-canvas');
const bgX=bgC.getContext('2d');
let BW,BH,bgT=0;

const RIBBONS=[
  {by:.18,amp:.09,sp:.00038,wid:130,ph:0},
  {by:.28,amp:.06,sp:.00028,wid: 90,ph:1.6},
  {by:.13,amp:.11,sp:.00052,wid: 70,ph:3.1},
];

const STARS=(()=>{
  const s=[];
  for(let i=0;i<220;i++){
    const t=(i*2654435761)>>>0;
    s.push({
      x:(t%10000)/10000,
      y:((t*987654321)>>>0)%10000/10000*.65,
      r:i%4===0?1.4:i%2===0?1:.6,
      twOffset:Math.random()*6.28
    });
  }
  return s;
})();

let clouds=(()=>{
  const cs=[];
  for(let i=0;i<6;i++) cs.push({
    xF:Math.random(),y:.18+Math.random()*.26,
    sp:.00006+Math.random()*.00008,
    w:.22+Math.random()*.18,h:.055+Math.random()*.04,
    op:.25+Math.random()*.2
  });
  return cs;
})();

function rsz(){
  BW=bgC.width=ptxC.width=window.innerWidth;
  BH=bgC.height=ptxC.height=window.innerHeight;
}
window.addEventListener('resize',rsz);
rsz();

function drawBg(ts){
  bgT=ts;
  const p=PAL[tod];
  bgX.clearRect(0,0,BW,BH);

  // sky gradient
  const g=bgX.createLinearGradient(0,0,0,BH);
  g.addColorStop(0,`rgb(${p.bgDeep})`);
  g.addColorStop(1,`rgb(${p.bgMid})`);
  bgX.fillStyle=g; bgX.fillRect(0,0,BW,BH);

  // stars (night/dawn)
  if(tod!=='day'){
    const salpha=tod==='dawn'?.35:.88;
    STARS.forEach(s=>{
      const tw=.4+.6*(.5+.5*Math.sin(ts*.0018+s.twOffset));
      bgX.beginPath();
      bgX.arc(s.x*BW,s.y*BH,s.r,0,6.28);
      bgX.fillStyle=`rgba(255,255,255,${tw*salpha})`;
      bgX.fill();
    });
  }

  // aurora ribbons
  bgX.save();
  bgX.globalCompositeOperation='screen';
  RIBBONS.forEach(rb=>{
    const pts=[];
    for(let i=0;i<=70;i++){
      const x=(i/70)*BW;
      const y=(rb.by+Math.sin(i*.09+ts*rb.sp*1000+rb.ph)*.6*rb.amp
               +Math.sin(i*.045+ts*rb.sp*500+rb.ph*1.8)*.4*rb.amp)*BH;
      pts.push({x,y});
    }
    const ga=bgX.createLinearGradient(0,0,BW,0);
    const [c1,c2,c3]=[p.a1,p.a2,p.a3];
    const al=tod==='day'?.05:tod==='dawn'?.14:.11;
    ga.addColorStop(0  ,`rgba(${c1},0)`);
    ga.addColorStop(.2 ,`rgba(${c1},${al})`);
    ga.addColorStop(.5 ,`rgba(${c2},${al*1.4})`);
    ga.addColorStop(.8 ,`rgba(${c3},${al*.85})`);
    ga.addColorStop(1  ,`rgba(${c1},0)`);

    bgX.beginPath();
    bgX.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length-2;i++){
      const mx=(pts[i].x+pts[i+1].x)/2, my=(pts[i].y+pts[i+1].y)/2;
      bgX.quadraticCurveTo(pts[i].x,pts[i].y,mx,my);
    }
    bgX.strokeStyle=ga; bgX.lineWidth=rb.wid; bgX.stroke();
    bgX.globalAlpha=.25; bgX.lineWidth=rb.wid*2; bgX.stroke();
    bgX.globalAlpha=1;
  });
  bgX.restore();

  // clouds (day/dawn)
  if(tod!=='night'){
    const cop=tod==='dawn'?.28:.48;
    clouds.forEach(cl=>{
      cl.xF=(cl.xF+cl.sp)%1.2;
      const cx=(cl.xF-.1)*BW, cy=cl.y*BH;
      const cg=bgX.createRadialGradient(cx,cy,0,cx,cy,cl.w*BW*.5);
      cg.addColorStop(0,`rgba(255,255,255,${cop*cl.op})`);
      cg.addColorStop(1,`rgba(255,255,255,0)`);
      bgX.fillStyle=cg;
      bgX.beginPath();
      bgX.ellipse(cx,cy,cl.w*BW*.5,cl.h*BH,0,0,6.28);
      bgX.fill();
    });
  }

  requestAnimationFrame(drawBg);
}
requestAnimationFrame(drawBg);

// ── Particle System ─────────────────────────────────────────────
const ptxC=document.getElementById('ptx-canvas');
const ptxX=ptxC.getContext('2d');
let ptxT=0;

class Ptx {
  constructor(stagger){
    this.reset();
    if(stagger){ this.life=Math.random()*this.maxLife; this.y=Math.random()*BH; }
  }
  reset(){
    this.x=Math.random()*BW;
    this.y=BH+10;
    this.vx=(Math.random()-.5)*.45;
    this.vy=-(0.18+Math.random()*.48);
    this.life=0;
    this.maxLife=200+Math.random()*320;
    this.sz=.5+Math.random()*1.8;
    this.wob=Math.random()*2.5;
    this.wobSp=.008+Math.random()*.018;
    this.angle=Math.random()*6.28;
    this.angSp=(Math.random()-.5)*.018;
  }
  update(){
    this.life++;
    this.x+=this.vx+Math.sin(this.life*this.wobSp)*this.wob*.12;
    this.y+=this.vy;
    this.angle+=this.angSp;
    if(this.life>=this.maxLife||this.y<-20) this.reset();
  }
  draw(){
    const al=Math.min(this.life/30,1)*Math.max(0,1-this.life/this.maxLife);
    const p=PAL[tod];
    ptxX.save(); ptxX.translate(this.x,this.y);
    if(tod==='night'){
      const rg=ptxX.createRadialGradient(0,0,0,0,0,this.sz*5);
      rg.addColorStop(0,`rgba(${p.a1},${al*.75})`);
      rg.addColorStop(1,`rgba(${p.a1},0)`);
      ptxX.fillStyle=rg;
      ptxX.beginPath(); ptxX.arc(0,0,this.sz*5,0,6.28); ptxX.fill();
      ptxX.fillStyle=`rgba(255,255,200,${al})`;
      ptxX.beginPath(); ptxX.arc(0,0,this.sz,0,6.28); ptxX.fill();
    } else if(tod==='dawn'){
      ptxX.fillStyle=`rgba(${p.a1},${al*.65})`;
      ptxX.beginPath(); ptxX.arc(0,0,this.sz,0,6.28); ptxX.fill();
    } else {
      ptxX.rotate(this.angle);
      ptxX.fillStyle=`rgba(255,255,255,${al*.28})`;
      ptxX.fillRect(-this.sz*.5,-this.sz*.5,this.sz,this.sz);
    }
    ptxX.restore();
  }
}

const PTXS=Array.from({length:65},(_,i)=>new Ptx(true));
function drawPtx(ts){
  ptxT=ts; ptxX.clearRect(0,0,BW,BH);
  PTXS.forEach(p=>{p.update();p.draw();});
  requestAnimationFrame(drawPtx);
}
requestAnimationFrame(drawPtx);

// ── Data ────────────────────────────────────────────────────────
const AVATARS=['🌙','🦊','🪶','🫖','⛵','🌿','🦋','🌸','🔮','🕯️','🌊','🍂'];
const MOODS=['midnight thoughts','coffee shop','wandering','heavy heart','nostalgia','quiet joy','unfinished','rain','foggy morning','letters unsent','after the storm','soft light'];
const CATS={fresh:'Fresh Whispers',deep:'Deep Dives',audio:'Audio Dreams',midnight:'Midnight Archives'};

let posts=[
  {id:1,author:'elara',av:'🌙',cat:'midnight',type:'poem',title:'insomnia, ii',
   body:`the ceiling knows all my secrets.\nI've counted its cracks like constellations,\nnamed them after people\nwho forgot to stay.\n\nsome nights the dark\nis a softer thing —\na blanket, not a burial.`,
   moods:['midnight thoughts','heavy heart','letters unsent'],

  {id:2,author:'theo',av:'⛵',cat:'fresh',type:'thought',title:'',
   body:`I keep leaving small pieces of myself in coffee shops. A song stuck in my head on a Tuesday. The way light falls through steam. Someone else's laugh that reminded me of you.\n\nMaybe that's what home is — all the pieces you've left everywhere.`,

// ── Position cache ───────────────────────────────────────────────
const posCache={};
function stablePos(id,idx){
  if(posCache[id]) return posCache[id];
  const cols=Math.max(2,Math.floor((window.innerWidth-80)/340));
  const col=idx%cols, row=Math.floor(idx/cols);
  const seed=id*137.508;
  const ox=Math.sin(seed)*55, oy=Math.cos(seed*1.4)*38;
  const rot=Math.sin(seed*2.2)*6.5;
  posCache[id]={x:col*340+48+ox, y:row*410+90+oy, rot};
  return posCache[id];
}

// ── Render helpers ───────────────────────────────────────────────
const RXN_EMOJIS=['🌌','✨','🌠','🌙'];

function mkWaveform(){
  return Array.from({length:20},(_,i)=>{
    const h=6+Math.sin(i*.72)*8+Math.sin(i*.3)*4;
    return `<div class="wbar" style="height:${h}px;--wh:${Math.max(10,h+6)}px;--wd:${i*.045}s"></div>`;
  }).join('');
}

function mkStickers(moods){
  return moods.map((m,i)=>{
    const r=(i%2===0?-1:1)*(1+i*.8);
    return `<span class="sticker" style="--sr:${r}deg">${m}</span>`;
  }).join('');
}

function mkReactions(post){
  return RXN_EMOJIS.map(e=>{
    const n=post.rxn[e]||0;
    return `<div class="rxn" data-e="${e}" data-id="${post.id}">${e}<span class="rxn-n">${n||''}</span></div>`;
  }).join('');
}

function mkWhispers(post){
  if(!post.comments.length) return '';
  return `<div class="whispers">
    <div class="whispers-lbl">// whispers</div>
    ${post.comments.map(c=>`
      <div class="whisper">
        <div class="whisper-av">${c.av}</div>
        <div class="whisper-body">
          <div class="whisper-author">${c.author}</div>
          <div class="whisper-text">${c.text}</div>
        </div>
      </div>`).join('')}
    <div class="add-whisper">
      <input class="whisper-input" placeholder="leave a whisper…" maxlength="200">
      <button class="whisper-send" data-id="${post.id}">✦</button>
    </div>
  </div>`;
}

function mkNote(post,idx){
  const isMob=window.innerWidth<=768;
  const pos=stablePos(post.id,idx);
  const SZ={s:'sz-s',m:'sz-m',l:'sz-l'}[post.sz||'m'];

  const el=document.createElement('div');
  el.className=`note ${SZ} entering`;
  el.dataset.id=post.id;
  el.dataset.cat=post.cat;

  if(!isMob){
    el.style.left=`${pos.x}px`;
    el.style.top=`${pos.y}px`;
    el.style.setProperty('--rot',`rotate(${pos.rot}deg)`);
    el.style.transform=`rotate(${pos.rot}deg)`;
    el.style.setProperty('--breathe-delay',`${(Math.random()*6).toFixed(1)}s`);
  }

  el.innerHTML=`
    <div class="pin"></div>
    <div class="note-close">✕</div>
    <div class="note-head">
      <div class="note-av">${post.av}</div>
      <div class="note-meta">
        <div class="note-author">${post.author}</div>
        <div class="note-ts">${post.ts}</div>
      </div>
      <span class="note-cat-tag">${CATS[post.cat]||''}</span>
    </div>
    ${post.title?`<div class="note-title">${post.title}</div>`:''}
    <div class="note-body${post.type==='poem'?' poem':''}">${post.body}</div>
    ${post.type==='audio'?`
      <div class="audio-wrap" data-id="${post.id}">
        <div class="vinyl">💿</div>
        <div class="waveform">${mkWaveform()}</div>
        <span class="audio-label">play</span>
      </div>`:''}
    <div class="stickers">${mkStickers(post.moods)}</div>
    <div class="reactions">${mkReactions(post)}</div>
    ${mkWhispers(post)}
  `;

  // remove entering class after animation
  el.addEventListener('animationend',()=>el.classList.remove('entering'),{once:true});

  return el;
}

// ── Board render ─────────────────────────────────────────────────
let currentFilter='all';
let expandedEl=null;
let expandedOrigStyle={};

const board=document.getElementById('board');

function render(){
  board.innerHTML='';
  const fp=currentFilter==='all'?posts:posts.filter(p=>p.cat===currentFilter);
  if(!fp.length){
    board.innerHTML=`<div class="empty-state"><div>✦</div><div>nothing here yet…</div></div>`;
    return;
  }
  let maxY=0;
  fp.forEach((post,i)=>{
    const el=mkNote(post,i);
    board.appendChild(el);
    if(window.innerWidth>768){
      const pos=stablePos(post.id,i);
      const h={s:200,m:320,l:430}[post.sz||'m'];
      maxY=Math.max(maxY,pos.y+h);
    }
  });
  if(window.innerWidth>768) board.style.minHeight=`${maxY+180}px`;
  bindInteractions();
}

// ── Interactions ─────────────────────────────────────────────────
const overlay=document.getElementById('overlay');

function expandNote(el){
  if(expandedEl) collapseNote();
  const rect=el.getBoundingClientRect();
  expandedOrigStyle={pos:'absolute',left:el.style.left,top:el.style.top,width:el.style.width,transform:el.style.transform,zIndex:el.style.zIndex};
  el.style.position='fixed';
  el.style.left=`${rect.left}px`;
  el.style.top=`${rect.top}px`;
  el.style.width=`${rect.width}px`;
  el.style.zIndex='220';
  requestAnimationFrame(()=>{
    el.classList.add('expanded');
    overlay.classList.add('on');
  });
  expandedEl=el;
}

function collapseNote(){
  if(!expandedEl) return;
  const el=expandedEl;
  el.classList.remove('expanded');
  overlay.classList.remove('on');
  const id=parseInt(el.dataset.id);
  const post=posts.find(p=>p.id===id);
  const idx=posts.indexOf(post);
  setTimeout(()=>{
    if(window.innerWidth>768&&post){
      const pos=stablePos(id,idx);
      el.style.position='absolute';
      el.style.left=`${pos.x}px`;
      el.style.top=`${pos.y}px`;
      el.style.width='';
      el.style.transform=`rotate(${pos.rot}deg)`;
      el.style.zIndex='10';
    }
    expandedEl=null;
  },420);
}

overlay.addEventListener('click',collapseNote);

function bindInteractions(){
  document.querySelectorAll('.note').forEach(el=>{
    el.addEventListener('click',e=>{
      if(e.target.closest('.rxn')||e.target.closest('.audio-wrap')||
         e.target.closest('.note-close')||e.target.closest('.whisper-send')||
         e.target.closest('.whisper-input')) return;
      if(el.classList.contains('expanded')) return;
      expandNote(el);
    });
  });

  document.querySelectorAll('.note-close').forEach(btn=>{
    btn.addEventListener('click',e=>{e.stopPropagation();collapseNote();});
  });

  // reactions
  document.querySelectorAll('.rxn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const pid=parseInt(btn.dataset.id), em=btn.dataset.e;
      const post=posts.find(p=>p.id===pid); if(!post) return;
      if(!post.rxn[em]) post.rxn[em]=0;
      post.rxn[em]=btn.classList.toggle('lit')?post.rxn[em]+1:Math.max(0,post.rxn[em]-1);
      btn.querySelector('.rxn-n').textContent=post.rxn[em]||'';
      btn.style.transform='scale(1.35)';
      setTimeout(()=>btn.style.transform='',220);
    });
  });

  // audio players
  document.querySelectorAll('.audio-wrap').forEach(aw=>{
    aw.addEventListener('click',e=>{
      e.stopPropagation();
      aw.classList.toggle('playing');
      aw.querySelector('.audio-label').textContent=aw.classList.contains('playing')?'pause':'play';
    });
  });

  // whisper send
  document.querySelectorAll('.whisper-send').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const inp=btn.previousElementSibling;
      const text=inp.value.trim();
      if(!text) return;
      const pid=parseInt(btn.dataset.id);
      const post=posts.find(p=>p.id===pid); if(!post) return;
      post.comments.push({av:'🌸',author:'you',text});
      inp.value='';
      const wl=btn.closest('.whispers');
      const newW=document.createElement('div');
      newW.className='whisper';
      newW.innerHTML=`<div class="whisper-av">🌸</div><div class="whisper-body"><div class="whisper-author">you</div><div class="whisper-text">${text}</div></div>`;
      wl.insertBefore(newW,wl.querySelector('.add-whisper'));
      toast('whisper added ✦');
    });
  });
}

// ── Compass nav ──────────────────────────────────────────────────
const filterBadge=document.getElementById('filter-badge');
let fbTimer=null;

document.querySelectorAll('.cmp-item').forEach(item=>{
  item.addEventListener('click',()=>{
    currentFilter=item.dataset.f;
    document.querySelectorAll('.cmp-item').forEach(x=>x.classList.remove('active'));
    item.classList.add('active');
    if(currentFilter==='all'){
      filterBadge.textContent=''; filterBadge.classList.remove('vis');
    } else {
      filterBadge.textContent=CATS[currentFilter]||'';
      filterBadge.classList.add('vis');
      clearTimeout(fbTimer);
      fbTimer=setTimeout(()=>filterBadge.classList.remove('vis'),3200);
    }
    if(expandedEl) collapseNote();
    render();
  });
});

// ── Stargaze ─────────────────────────────────────────────────────
let stargazing=false, sgIdx=0, sgTimer=null;
const sgBtn=document.getElementById('stargaze-btn');

sgBtn.addEventListener('click',()=>{
  stargazing=!stargazing;
  sgBtn.classList.toggle('active',stargazing);
  sgBtn.querySelector('span').textContent=stargazing?'stop floating':'Stargaze';
  if(!stargazing){
    clearInterval(sgTimer);
    document.querySelectorAll('.note').forEach(n=>{n.style.opacity='';n.style.filter='';});
    return;
  }
  sgIdx=0;
  function step(){
    const notes=[...document.querySelectorAll('.note')];
    if(!notes.length) return;
    notes.forEach((n,i)=>{
      n.style.opacity=i===sgIdx%notes.length?'1':'0.2';
      n.style.filter=i===sgIdx%notes.length?'none':'blur(1px)';
    });
    const active=notes[sgIdx%notes.length];
    active?.scrollIntoView({behavior:'smooth',block:'center'});
    sgIdx++;
  }
  step();
  sgTimer=setInterval(step,3200);

  function stopSg(e){
    if(!e.target.closest('#stargaze-btn')){
      stargazing=false;
      sgBtn.classList.remove('active');
      sgBtn.querySelector('span').textContent='Stargaze';
      clearInterval(sgTimer);
      document.querySelectorAll('.note').forEach(n=>{n.style.opacity='';n.style.filter='';});
      document.removeEventListener('click',stopSg);
    }
  }
  setTimeout(()=>document.addEventListener('click',stopSg),100);
});

// ── Write modal ──────────────────────────────────────────────────
const writeModal=document.getElementById('write-modal');
const writeBtn=document.getElementById('write-btn');
let selAv='🌙', selType='thought', addedMoods=[];

// Avatar row
const avRow=document.getElementById('av-row');
AVATARS.forEach(av=>{
  const d=document.createElement('div');
  d.className='av-opt'+(av===selAv?' sel':'');
  d.textContent=av;
  d.addEventListener('click',()=>{
    avRow.querySelectorAll('.av-opt').forEach(x=>x.classList.remove('sel'));
    d.classList.add('sel'); selAv=av;
  });
  avRow.appendChild(d);
});

// Type row
document.querySelectorAll('.type-opt').forEach(opt=>{
  opt.addEventListener('click',()=>{
    document.querySelectorAll('.type-opt').forEach(x=>x.classList.remove('sel'));
    opt.classList.add('sel'); selType=opt.dataset.t;
  });
});

// Mood chips
const moodChipsEl=document.getElementById('mood-chips');
const moodAdded=document.getElementById('mood-added');
const moodPH=document.getElementById('mood-placeholder');

MOODS.forEach(m=>{
  const c=document.createElement('div');
  c.className='mood-chip'; c.textContent=m;
  c.addEventListener('click',()=>{
    if(addedMoods.includes(m)) return;
    addedMoods.push(m);
    c.classList.add('picked');
    moodPH.style.display='none';
    const tag=document.createElement('div');
    tag.className='mood-picked'; tag.innerHTML=`${m}<span>×</span>`;
    tag.addEventListener('click',()=>{
      addedMoods=addedMoods.filter(x=>x!==m);
      tag.remove(); c.classList.remove('picked');
      if(!addedMoods.length) moodPH.style.display='';
    });
    moodAdded.appendChild(tag);
  });
  moodChipsEl.appendChild(c);
});

function openModal(){
  writeModal.classList.add('open');
  overlay.classList.add('on');
}
function closeModal(){
  writeModal.classList.remove('open');
  overlay.classList.remove('on');
}

writeBtn.addEventListener('click',openModal);
document.getElementById('cancel-btn').addEventListener('click',closeModal);

document.getElementById('pub-btn').addEventListener('click',()=>{
  const title=document.getElementById('note-title-in').value.trim();
  const body=document.getElementById('note-body-in').value.trim();
  if(!body){ toast('your note needs some words ✦'); return; }

  const catMap={thought:Math.random()>.5?'fresh':'midnight',poem:'midnight',story:'deep',audio:'audio'};
  const newPost={
    id:Date.now(), author:'you', av:selAv,
    cat:catMap[selType]||'fresh', type:selType,
    title, body, moods:[...addedMoods],
    rxn:{'🌌':0,'✨':0,'🌠':0,'🌙':0},
    comments:[], ts:'just now',
    sz:body.length>220?'l':body.length>80?'m':'s'
  };
  posts.unshift(newPost);

  // reset
  document.getElementById('note-title-in').value='';
  document.getElementById('note-body-in').value='';
  addedMoods=[];
  moodAdded.querySelectorAll('.mood-picked').forEach(t=>t.remove());
  moodPH.style.display='';
  moodChipsEl.querySelectorAll('.mood-chip').forEach(c=>c.classList.remove('picked'));

  closeModal();
  currentFilter='all';
  document.querySelectorAll('.cmp-item').forEach(x=>x.classList.remove('active'));
  document.querySelector('.cmp-item[data-f="all"]').classList.add('active');
  render();
  toast('your note found its place ✦');
});

// ── Toast ────────────────────────────────────────────────────────
const toastEl=document.getElementById('toast');
let toastTimer=null;
function toast(msg){
  toastEl.textContent=msg;
  toastEl.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toastEl.classList.remove('on'),3100);
}

// ── Init ─────────────────────────────────────────────────────────
document.fonts.ready.then(()=>{
  render();
  setTimeout(()=>{
    const ld=document.getElementById('loading');
    ld.classList.add('gone');
    setTimeout(()=>ld.remove(),1300);
  },2200);
});
</script>
